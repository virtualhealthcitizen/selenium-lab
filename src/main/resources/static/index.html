<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager — Selenium Testbed</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --accent: #c8f135;
      --accent-dim: #9dba2a;
      --text: #e8e8e8;
      --muted: #666;
      --danger: #ff4f4f;
      --done: #444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
    }

    header {
      width: 100%;
      max-width: 640px;
      margin-bottom: 40px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--accent);
      line-height: 1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 6px;
    }

    /* ── Stats bar ── */
    #stats-bar {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 1.4rem; font-weight: 500; color: var(--accent); }

    /* ── Input area ── */
    #input-area {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    #task-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    #task-input:focus { border-color: var(--accent); }
    #task-input::placeholder { color: var(--muted); }

    #priority-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      padding: 12px 12px;
      cursor: pointer;
      outline: none;
    }

    #add-btn {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #0f0f0f;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 12px 22px;
      transition: background 0.15s, transform 0.1s;
    }

    #add-btn:hover { background: var(--accent-dim); }
    #add-btn:active { transform: scale(0.97); }

    /* ── Filters ── */
    #filter-bar {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 6px 14px;
      transition: all 0.15s;
    }

    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Search ── */
    #search-input {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 6px 12px;
      outline: none;
      width: 160px;
      transition: border-color 0.15s;
    }

    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }

    /* ── Task list ── */
    #task-list {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      transition: border-color 0.15s, opacity 0.2s;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { border-color: #3e3e3e; }

    .task-item.done {
      opacity: 0.5;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .priority-badge {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 3px;
      font-weight: 500;
    }

    .priority-badge.high   { background: #3a1a1a; color: #ff7a7a; border: 1px solid #5a2020; }
    .priority-badge.medium { background: #2e2a14; color: #f0c060; border: 1px solid #4e4020; }
    .priority-badge.low    { background: #152215; color: #7cc87c; border: 1px solid #254025; }

    .delete-btn {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 4px 8px;
      transition: all 0.15s;
    }

    .delete-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Empty state ── */
    #empty-state {
      width: 100%;
      max-width: 640px;
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      font-size: 0.85rem;
      display: none;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #0f0f0f;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 6px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Clear all btn ── */
    #clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--danger);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      margin-left: auto;
      padding: 6px 14px;
      transition: all 0.15s;
    }

    #clear-btn:hover { border-color: var(--danger); background: #1e0f0f; }

    /* ── Status message (Selenium readable) ── */
    #status-message {
      width: 100%;
      max-width: 640px;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 24px;
      min-height: 18px;
    }
  </style>
</head>
<body>

  <header>
    <h1>TASK<br>MANAGER</h1>
    <p class="subtitle">// selenium-testable frontend demo</p>
  </header>

  <!-- Stats -->
  <div id="stats-bar">
    <div class="stat">
      <span class="stat-label">Total</span>
      <span class="stat-value" id="stat-total">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Active</span>
      <span class="stat-value" id="stat-active">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Done</span>
      <span class="stat-value" id="stat-done">0</span>
    </div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <input
      id="task-input"
      type="text"
      placeholder="Add a new task…"
      maxlength="120"
      autocomplete="off"
    />
    <select id="priority-select">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <button id="add-btn">+ Add</button>
  </div>

  <!-- Filter bar -->
  <div id="filter-bar">
    <button class="filter-btn active" data-filter="all"   id="filter-all">All</button>
    <button class="filter-btn"        data-filter="active" id="filter-active">Active</button>
    <button class="filter-btn"        data-filter="done"   id="filter-done">Done</button>
    <button id="clear-btn">Clear done</button>
    <input id="search-input" type="text" placeholder="Search…" />
  </div>

  <!-- Task list -->
  <ul id="task-list" aria-label="Task list"></ul>

  <!-- Empty state -->
  <div id="empty-state">No tasks yet — add one above.</div>

  <!-- Status (readable by Selenium) -->
  <p id="status-message" aria-live="polite"></p>

  <!-- Toast -->
  <div id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────
  let tasks = [];
  let nextId = 1;
  let currentFilter = 'all';
  let searchQuery = '';

  // ── DOM refs ───────────────────────────────────────────────
  const taskInput     = document.getElementById('task-input');
  const prioritySel   = document.getElementById('priority-select');
  const addBtn        = document.getElementById('add-btn');
  const taskList      = document.getElementById('task-list');
  const emptyState    = document.getElementById('empty-state');
  const statusMsg     = document.getElementById('status-message');
  const statTotal     = document.getElementById('stat-total');
  const statActive    = document.getElementById('stat-active');
  const statDone      = document.getElementById('stat-done');
  const clearBtn      = document.getElementById('clear-btn');
  const searchInput   = document.getElementById('search-input');
  const filterBtns    = document.querySelectorAll('.filter-btn');
  const toast         = document.getElementById('toast');

  // ── Core logic ─────────────────────────────────────────────
  function addTask() {
    const text = taskInput.value.trim();
    if (!text) {
      setStatus('Please enter a task name.');
      taskInput.focus();
      return;
    }
    const task = {
      id: nextId++,
      text,
      priority: prioritySel.value,
      done: false,
      createdAt: Date.now()
    };
    tasks.unshift(task);
    taskInput.value = '';
    render();
    setStatus(`Task added: "${task.text}"`);
    showToast('Task added!');
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) {
      t.done = !t.done;
      render();
      setStatus(t.done ? `Completed: "${t.text}"` : `Reopened: "${t.text}"`);
    }
  }

  function deleteTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) {
      tasks = tasks.filter(t => t.id !== id);
      render();
      setStatus(`Deleted: "${t.text}"`);
      showToast('Task deleted.');
    }
  }

  function clearDone() {
    const count = tasks.filter(t => t.done).length;
    tasks = tasks.filter(t => !t.done);
    render();
    setStatus(`Cleared ${count} completed task(s).`);
  }

  // ── Render ─────────────────────────────────────────────────
  function render() {
    const filtered = tasks.filter(t => {
      const matchFilter =
        currentFilter === 'all' ||
        (currentFilter === 'active' && !t.done) ||
        (currentFilter === 'done' && t.done);
      const matchSearch = t.text.toLowerCase().includes(searchQuery.toLowerCase());
      return matchFilter && matchSearch;
    });

    taskList.innerHTML = '';

    filtered.forEach(task => {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.done ? ' done' : '');
      li.id = `task-${task.id}`;
      li.setAttribute('data-priority', task.priority);
      li.setAttribute('data-done', task.done);

      li.innerHTML = `
        <input
          class="task-checkbox"
          type="checkbox"
          id="check-${task.id}"
          ${task.done ? 'checked' : ''}
          aria-label="Mark task done"
        />
        <label class="task-text" for="check-${task.id}" id="text-${task.id}">${escapeHtml(task.text)}</label>
        <span class="priority-badge ${task.priority}" id="priority-${task.id}">${task.priority}</span>
        <button class="delete-btn" id="delete-${task.id}" aria-label="Delete task">✕</button>
      `;

      li.querySelector('.task-checkbox').addEventListener('change', () => toggleTask(task.id));
      li.querySelector('.delete-btn').addEventListener('click', () => deleteTask(task.id));

      taskList.appendChild(li);
    });

    const done  = tasks.filter(t => t.done).length;
    const total = tasks.length;
    const active = total - done;

    statTotal.textContent  = total;
    statActive.textContent = active;
    statDone.textContent   = done;

    emptyState.style.display = filtered.length === 0 ? 'block' : 'none';
  }

  // ── Helpers ────────────────────────────────────────────────
  function setStatus(msg) {
    statusMsg.textContent = msg;
  }

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Events ─────────────────────────────────────────────────
  addBtn.addEventListener('click', addTask);

  taskInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
      setStatus(`Filter: ${currentFilter}`);
    });
  });

  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value;
    render();
  });

  clearBtn.addEventListener('click', clearDone);

  // ── Seed data ──────────────────────────────────────────────
  [
    { text: 'Write Selenium test suite',   priority: 'high' },
    { text: 'Review pull requests',        priority: 'medium' },
    { text: 'Update project documentation', priority: 'low' },
  ].forEach(({ text, priority }) => {
    tasks.push({ id: nextId++, text, priority, done: false, createdAt: Date.now() });
  });

  render();
  setStatus('Ready.');
</script>
</body>
</html>
